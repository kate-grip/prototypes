<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/*
 * ── Grip Cloud 컬러 시스템 (Light) ──
 * Primary:    Strong #222222 | Normal #003D99 | Secondary #508EFF | Admin_point #1677FF
 * Border:     Normal #E4E5E7 | Accent #AFB0B2 | Assistive #F0F0F0 | Bold #666666
 * Status:     Positive #6198FD | Negative1 #F23526 | Negative2 #FF4D4F
 * Text:       Normal #222222 | Sub-menu #6C6C6C | Alternative #888888 | Assistive #B0B0B0
 * Background: 001 #F9F9F9 | 002 #FAFAFA | 003 #F7F8FA | 004 #E6F4FF
 * Dim:        Modal rgba(0,0,0,0.45) | Toast rgba(0,0,0,0.10)
 */
const C = {
  primary: "#1677FF", primaryLight: "#E6F4FF", bg: "#F9F9F9", white: "#FFFFFF",
  g50: "#FAFAFA", g100: "#F0F0F0", g200: "#E4E5E7", g300: "#AFB0B2",
  g400: "#B0B0B0", g500: "#888888", g600: "#6C6C6C", g700: "#666666",
  g800: "#222222", g900: "#222222",
  amber50: "#FFFBEB", amber500: "#F59E0B", amber700: "#B45309",
  green50: "#F6FFED", green600: "#52C41A", green700: "#52C41A",
  red500: "#FF4D4F",
};

const LABEL_W = 100;

// ─── 공통 컴포넌트 ───

function Toggle({ enabled, onChange, disabled }) {
  return (
    <button onClick={() => { if (!disabled) onChange(!enabled); }} style={{
      width: 40, height: 22, borderRadius: 11, border: "none",
      backgroundColor: disabled ? C.g300 : (enabled ? C.g900 : C.g300), cursor: disabled ? "not-allowed" : "pointer",
      position: "relative", transition: "background-color 0.2s", flexShrink: 0, padding: 0,
    }}>
      <div style={{
        width: 16, height: 16, borderRadius: "50%", backgroundColor: C.white,
        position: "absolute", top: 3, left: enabled ? 21 : 3,
        transition: "left 0.2s", boxShadow: "0 1px 2px rgba(0,0,0,0.15)",
      }} />
    </button>
  );
}

function Badge({ status }) {
  if (status === "idle") return null;
  const isGen = status === "generating";
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: "3px 12px", borderRadius: 4, fontSize: 10, fontWeight: 700, marginLeft: 8,
      backgroundColor: isGen ? C.amber50 : "rgba(128,226,126,0.2)", color: isGen ? C.amber700 : "#4CAF50",
      whiteSpace: "nowrap",
    }}>
      {isGen && <span style={{ width: 5, height: 5, borderRadius: "50%", backgroundColor: C.amber500, animation: "pulse 1.5s ease-in-out infinite" }} />}
      {isGen ? "자막 생성중" : "자막 생성완료"}
    </span>
  );
}

function TooltipIcon({ text, align = "left" }) {
  const [show, setShow] = useState(false);
  const posStyle = align === "left"
    ? { left: 0, transform: "none" }
    : { left: "50%", transform: "translateX(-50%)" };
  const arrowStyle = align === "left"
    ? { left: 8 }
    : { left: "50%", transform: "translateX(-50%)" };
  return (
    <div style={{ position: "relative", display: "inline-flex", marginLeft: 4 }}
      onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0, cursor: "help" }}>
        <circle cx="8" cy="8" r="7" stroke={C.g400} strokeWidth="1.2" fill="none" />
        <text x="8" y="11.5" textAnchor="middle" fill={C.g400} fontSize="10" fontWeight="600" fontFamily="inherit">?</text>
      </svg>
      {show && text && (
        <div style={{
          position: "absolute", bottom: "calc(100% + 8px)", ...posStyle,
          backgroundColor: C.g800, color: C.white, fontSize: 12, lineHeight: 1.6,
          padding: "8px 12px", borderRadius: 6, whiteSpace: "nowrap", zIndex: 100,
          boxShadow: "0 4px 12px rgba(0,0,0,0.15)", animation: "fadeIn 0.12s ease",
        }}>
          {text}
          <div style={{ position: "absolute", top: "100%", ...arrowStyle, width: 0, height: 0, borderLeft: "5px solid transparent", borderRight: "5px solid transparent", borderTop: `5px solid ${C.g800}` }} />
        </div>
      )}
    </div>
  );
}

function FormRow({ label, required, children, labelTop }) {
  return (
    <div style={{ display: "flex", gap: 0, marginBottom: 24, alignItems: labelTop ? "flex-start" : "center" }}>
      <div style={{ width: LABEL_W, flexShrink: 0, fontSize: 13, fontWeight: 500, color: C.g700, paddingTop: labelTop ? 4 : 0 }}>
        {required && <span style={{ color: C.red500 }}>* </span>}{label}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>{children}</div>
    </div>
  );
}

  // 실제 고유 발화 수 확인 (1004개 이상이어야 함)
  if (L.length < 1004) { while (L.length < 1004) L.push("감사합니다 여러분 좋은 밤 되세요"); }
  const finalLines = L.slice(0, 1004);

  const result = [];
  const totalSec = 3580;
  const step = totalSec / 1004;
  let t = 2;
  for (let i = 0; i < 1004; i++) {
    const dur = 3 + (i % 3);
    const st = Math.floor(t);
    const et = Math.floor(t + dur);
    const fmt = (sec) => {
      const hh = String(Math.floor(sec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
      const ss = String(Math.floor(sec % 60)).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    };
    result.push({ id: i + 1, start: fmt(st), end: fmt(et), text: finalLines[i] });
    t += step;
  }
  return result;
})();

                  style={{
                    padding: "4px 10px", borderRadius: 4, fontSize: 11, cursor: "pointer",

                    backgroundColor: searchOpen ? C.primaryLight : C.white,
                    color: searchOpen ? C.primary : C.g600,
                  }}
                >
                  {searchOpen ? "닫기" : "찾기 / 바꾸기"}
                </button>
              </div>
            </div>

            {/* 찾기 / 바꾸기 패널 */}
            {searchOpen && (
              <div style={{
                padding: "0 20px 10px", flexShrink: 0,

                  display: "flex", flexDirection: "column", gap: 6,

                }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <input
                      type="text" placeholder="찾을 내용" value={searchText}
                      onChange={e => setSearchText(e.target.value)}
                      style={{
                        flex: 1, padding: "6px 10px", borderRadius: 4, border: `1px solid ${C.g200}`,
                        fontSize: 12, outline: "none", backgroundColor: C.white,
                      }}
                      onFocus={e => e.target.style.borderColor = C.primary}
                      onBlur={e => e.target.style.borderColor = C.g200}
                    />
                    {searchText && (
                      <span style={{ fontSize: 11, color: C.g400, flexShrink: 0 }}>
                        {matchCount > 0 ? `${matchCount}건` : "결과 없음"}
                      </span>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <input
                      type="text" placeholder="바꿀 내용" value={replaceText}
                      onChange={e => setReplaceText(e.target.value)}

                        flex: 1, padding: "6px 10px", borderRadius: 4, border: `1px solid ${C.g200}`,
                        fontSize: 12, outline: "none", backgroundColor: C.white,
                      }}
                      onFocus={e => e.target.style.borderColor = C.primary}
                      onBlur={e => e.target.style.borderColor = C.g200}
                    />
                    <button
                      onClick={handleReplaceAll}
                      disabled={!searchText || matchCount === 0}
                      style={{
                        padding: "6px 12px", borderRadius: 4, border: "none", flexShrink: 0,

                        color: searchText && matchCount > 0 ? C.white : C.g400,
                      }}
                    >모두 바꾸기</button>
                  </div>
                </div>
              </div>
            )}

            {/* 자막 리스트 */}
            <div ref={listRef} style={{ flex: 1, overflow: "auto", padding: "8px 0" }}>
              {filteredSubs.map((sub) => {
                const idx = subs.findIndex(s => s.id === sub.id);
                const isActive = sub.id === activeId;
                return (
                  <div key={sub.id}
                    onClick={() => handleSubClick(sub)}
                    style={{
                      padding: "10px 20px", cursor: "pointer",
                      backgroundColor: isActive ? C.primaryLight : "transparent",
                      borderLeft: `3px solid ${isActive ? C.primary : "transparent"}`,
                      transition: "all 0.15s",
                    }}
                    onMouseOver={e => { if (!isActive) e.currentTarget.style.backgroundColor = C.g50; }}
                    onMouseOut={e => { if (!isActive) e.currentTarget.style.backgroundColor = "transparent"; }}
                  >
                    {/* 번호 + 싱크 */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <span style={{
                        minWidth: 22, height: 22, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 5px", flexShrink: 0,
                        fontSize: 11, fontWeight: 600,
                        backgroundColor: isActive ? C.primary : C.g100,
                        color: isActive ? C.white : C.g400,
                      }}>{idx + 1}</span>

                      {/* start */}
                      <input
                        type="text" value={sub.start}
                        onChange={e => handleTimeChange(sub.id, "start", e.target.value)}
                        onClick={e => e.stopPropagation()}
                        style={{
                          width: 72, padding: "3px 6px", borderRadius: 4, border: `1px solid ${isActive ? C.primary : "#EBEBEB"}`,
                          fontSize: 11, fontVariantNumeric: "tabular-nums", color: C.g700, textAlign: "center",
                          backgroundColor: C.white, outline: "none",
                        }}
                        onFocus={e => e.target.style.borderColor = C.primary}
                        onBlur={e => { if (!isActive) e.target.style.borderColor = C.g200; }}
                      />
                      <span style={{ fontSize: 11, color: C.g400 }}>~</span>
                      {/* end */}
                      <input
                        type="text" value={sub.end}
                        onChange={e => handleTimeChange(sub.id, "end", e.target.value)}
                        onClick={e => e.stopPropagation()}
                        style={{
                          width: 72, padding: "3px 6px", borderRadius: 4, border: `1px solid ${isActive ? C.primary : "#EBEBEB"}`,
                          fontSize: 11, fontVariantNumeric: "tabular-nums", color: C.g700, textAlign: "center",
                          backgroundColor: C.white, outline: "none",
                        }}
                        onFocus={e => e.target.style.borderColor = C.primary}
                        onBlur={e => { if (!isActive) e.target.style.borderColor = C.g200; }}
                      />
                      <span style={{
                        fontSize: 10, color: C.g400, backgroundColor: C.g100,
                        padding: "2px 6px", borderRadius: 8, marginLeft: "auto",
                      }}>
                        {(() => {
                          const toSec = t => t.split(":").reduce((a, b, i) => a + parseInt(b) * [3600, 60, 1][i], 0);
                          return `${toSec(sub.end) - toSec(sub.start)}초`;
                        })()}
                      </span>
                    </div>

                    {/* 텍스트 */}
                    <textarea
                      value={sub.text}
                      onChange={e => handleTextChange(sub.id, e.target.value)}
                      onClick={e => e.stopPropagation()}
                      rows={2}
                      style={{
                        width: "100%", padding: "8px 10px", borderRadius: 6,
                        border: `1px solid ${isActive ? C.primary : "transparent"}`,
                        fontSize: 13, lineHeight: 1.5, color: C.g800,
                        resize: "none", outline: "none", fontFamily: "inherit",
                        backgroundColor: isActive ? C.white : C.g50,
                      }}
                      onFocus={e => { e.target.style.borderColor = C.primary; e.target.style.backgroundColor = C.white; }}
                      onBlur={e => { if (!isActive) { e.target.style.borderColor = "transparent"; e.target.style.backgroundColor = C.g50; } }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* 모달 푸터 */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8,
          padding: "14px 24px", borderTop: `1px solid ${C.g200}`, flexShrink: 0,
        }}>
          <button onClick={onClose} style={{
            padding: "8px 20px", borderRadius: 6, border: `1px solid ${C.g200}`,
            backgroundColor: C.white, fontSize: 13, color: C.g600, cursor: "pointer",
          }}>취소</button>
          <button onClick={isDirty ? onClose : undefined} disabled={!isDirty} style={{
            padding: "8px 20px", borderRadius: 6, border: "none",
            backgroundColor: isDirty ? C.g900 : C.g300, fontSize: 13, fontWeight: 600,
            color: C.white, cursor: isDirty ? "pointer" : "not-allowed",
            opacity: isDirty ? 1 : 0.5, transition: "all 0.15s",
          }}>확인</button>
        </div>
      </div>
    </div>
  );
}

                권장 크기 : 720x1280 (9:16)<br />용량: 10MB 이하<br />형식 : JPG, PNG, GIF
              </div>
            </div>
          </FormRow>

          {/* ── 자막 설정 ── */}
          <div style={{ borderTop: `1px solid ${C.g100}`, paddingTop: 16 }}>

            {/* 자동자막 사용 */}
            <div style={{ display: "flex", alignItems: "center", minHeight: 36 }}>
              <div style={{ width: LABEL_W, flexShrink: 0, display: "flex", alignItems: "center" }}>
                <span style={{ fontSize: 13, fontWeight: 500, color: C.g700 }}>자동자막 사용</span>
                <TooltipIcon text="라이브 종료 후 VOD 변환 시 발화 기반 자막을 자동 생성합니다." />
              </div>
              <Toggle enabled={autoSub} onChange={handleAutoToggle} disabled={status === "complete"} />
              {status !== "idle" && <Badge status={status} />}
              {/* [VOD 라이브 고도화 시 활성화] 자막 확인 및 수정 버튼
              {autoSub && status === "complete" && (
                <button onClick={() => setShowModal(true)} style={{
                  marginLeft: "auto", padding: "4px 12px", borderRadius: 6,
                  border: `1px solid ${C.g200}`, backgroundColor: C.white,
                  fontSize: 12, fontWeight: 500, color: C.g600,
                  cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap",
                }}
                  onMouseOver={e => { e.currentTarget.style.backgroundColor = C.g50; e.currentTarget.style.borderColor = C.g300; }}
                  onMouseOut={e => { e.currentTarget.style.backgroundColor = C.white; e.currentTarget.style.borderColor = C.g200; }}
                >
                  자막 확인 및 수정
                </button>
              )}
              */}
            </div>

            {/* 자동자막 ON 시 안내 */}
            {autoSub && status !== "complete" && (
              <div style={{ marginTop: 8, marginLeft: LABEL_W, animation: "fadeIn 0.2s ease" }}>
                <div style={{ padding: "8px 12px", borderRadius: 6, backgroundColor: C.primaryLight }}>
                  <span style={{ fontSize: 12, color: C.primary, lineHeight: 1.5 }}>라이브 종료 후 VOD 변환 시 자막이 자동 생성됩니다.</span>
                </div>
              </div>
            )}

            {/* 자막 노출 — 자동자막 ON이면 노출 */}
            {autoSub && (
              <div style={{ display: "flex", alignItems: "center", minHeight: 36, marginTop: 12, animation: "fadeIn 0.2s ease" }}>
                <div style={{ width: LABEL_W, flexShrink: 0, display: "flex", alignItems: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 500, color: C.g700 }}>자막 노출</span>
                  <TooltipIcon text="자막 생성 완료 시 시청자 플레이어에서 자막 노출 여부를 제어합니다." />
                </div>
                <div style={{ position: "relative", display: "inline-flex", alignItems: "center" }}>
                  <Toggle enabled={expose} onChange={(v) => { if (status === "complete") return; setExpose(v); if (autoSub) setActiveScenario(v ? 2 : 3); }} disabled={status === "complete"} />
                  {status === "complete" && (
                    <div
                      style={{ position: "absolute", left: 0, top: 0, width: 44, height: 24, cursor: "not-allowed", zIndex: 2 }}
                      onMouseEnter={(e) => { const tip = e.currentTarget.nextSibling; if(tip) tip.style.opacity = 1; }}
                      onMouseLeave={(e) => { const tip = e.currentTarget.nextSibling; if(tip) tip.style.opacity = 0; }}
                    />
                  )}
                  {status === "complete" && (
                    <div style={{
                      position: "absolute", left: 50, top: "50%", transform: "translateY(-50%)",
                      backgroundColor: C.g800, color: C.white, fontSize: 11, padding: "6px 10px",
                      borderRadius: 6, whiteSpace: "nowrap", opacity: 0, transition: "opacity 0.15s",
                      pointerEvents: "none", zIndex: 10,
                    }}>
                      해당 VOD 수정 페이지에서 노출 여부 변경 가능합니다
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* RIGHT: 미리보기 */}
        <div style={{ flex: "0 0 320px", backgroundColor: C.white, borderRadius: 10, border: `1px solid ${C.g200}`, padding: "20px 16px", alignSelf: "flex-start" }}>
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.g900 }}>미리보기</div>
              <div style={{ marginLeft: "auto", display: "flex", gap: 8, fontSize: 14, color: C.g400 }}>
                <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", color: C.primary, fontWeight: 600 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 14, height: 14, borderRadius: "50%", border: `2px solid ${C.primary}` }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: C.primary }} />
                  </span>
                  라이브
                </label>
                <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", fontSize: 14 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 14, height: 14, borderRadius: "50%", border: `2px solid ${C.g300}` }} />
                  예약
                </label>
              </div>
            </div>
          </div>

          <div style={{ width: "100%", aspectRatio: "9/16", borderRadius: 16, backgroundColor: "#1a1a1a", position: "relative", overflow: "hidden" }}>
            {/* 영상 배경 이미지 */}
            <div style={{ position: "absolute", inset: 0, backgroundImage: `url(${pageMode === "edit" ? COVER_EDIT : COVER_PLACEHOLDER})`, backgroundSize: "cover", backgroundPosition: "center" }} />
            {/* 상단 딤 */}
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "20%", backgroundImage: "linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 100%)", zIndex: 1 }} />
            {/* 하단 딤 - Figma: Linear #000 60% */}
            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "35%", backgroundImage: "linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%)", zIndex: 1 }} />

            {/* 상단 영역 */}
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "10px 10px 0", zIndex: 2 }}>
              {/* 1행: Powered by Grip + 라인 아이콘 */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ fontSize: 8, color: "rgba(255,255,255,0.6)" }}>Powered by <span style={{ fontWeight: 600 }}>Grip</span></div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {/* 음소거 */}
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M8 2L4.5 5.5H2v5h2.5L8 14V2z"/><line x1="12" y1="5.5" x2="12" y2="10.5"/><line x1="15" y1="5.5" x2="15" y2="10.5"/>
                  </svg>
                  {/* 공유 - 쓰리닷 */}
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="3" r="1.5"/><circle cx="4" cy="8" r="1.5"/><circle cx="12" cy="13" r="1.5"/><line x1="5.4" y1="7.1" x2="10.6" y2="3.9"/><line x1="5.4" y1="8.9" x2="10.6" y2="12.1"/>
                  </svg>
                  {/* 설정 - 톱니바퀴 */}
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 8.68a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                  </svg>
                  {/* 닫기 */}
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="1.5" strokeLinecap="round">
                    <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
                  </svg>
                </div>
              </div>
              {/* 2행: 아바타 + 제목/부제 */}
              <div style={{ display: "flex", gap: 6, alignItems: "flex-start" }}>
                <img src={LOGO_IMG} style={{ width: 24, height: 24, borderRadius: 12, flexShrink: 0, marginTop: 1, objectFit: "cover" }} />
                <div style={{ minWidth: 0, flex: 1, overflow: "hidden" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    {/* LIVE 뱃지 — Figma: Badge-Admin-Service type=Live, H:20, padding 0 8, radius 100, fill Linear #EC1F3E → #E45C1F */}
                    <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", height: 20, padding: "0 8px", borderRadius: 100, background: "linear-gradient(90deg, #EC1F3E 0%, #E45C1F 100%)", fontSize: 9, fontWeight: 700, color: C.white, flexShrink: 0 }}>LIVE</span>
                    <span style={{
                      fontSize: 11, fontWeight: 600, color: C.white,
                      textShadow: "0 1px 2px rgba(0,0,0,0.3)",
                      overflow: "hidden", whiteSpace: "nowrap", flex: 1,
                    }} ref={titleRef}>{liveTitle ? (titleOverflow ? <span style={{ display: "inline-block", animation: "marquee 12s linear infinite" }}>{liveTitle}    {liveTitle}    </span> : liveTitle) : <span style={{ opacity: 0.5 }}>방송명이 들어갑니다.</span>}</span>
                  </div>
                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.5)", marginTop: 2, display: "flex", alignItems: "center", gap: 3 }}>
                    <span>그립 클라우드 라이브</span>
                    <span style={{ margin: "0 1px" }}> · </span>
                    <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                      <path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/>
                    </svg>
                    <span>0</span>
                  </div>
                </div>
              </div>
            </div>

            {/* 자막 오버레이 */}
            {showSubInPreview && (
              <div style={{ position: "absolute", bottom: "25%", left: 12, right: 12, display: "flex", justifyContent: "center", animation: "subtitleFade 0.3s ease", zIndex: 2 }}>
                <div style={{ backgroundColor: "rgba(0,0,0,0.65)", borderRadius: 4, padding: "4px 10px", fontSize: 10, color: C.white, lineHeight: 1.5, textAlign: "center", maxWidth: "85%" }}>
                  이번에 준비한 스트로베리 초콜릿 케이크인데요
                </div>
              </div>
            )}

            {/* 하단 상품 목록 */}
            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "30px 10px 12px", zIndex: 2 }}>
              {[
                { p: "₩**", n: "Rustic Soft Keyboard", c: "rgba(255,255,255,0.5)" },
                { p: "₩**", n: "Fantastic Soft Chicken", c: "rgba(255,255,255,0.7)" },
                { p: "₩**", n: "Licensed Metal Mouse", c: "rgba(255,255,255,0.7)" },
                { p: "₩**", n: "Pratical Frozen Salad", c: "rgba(255,255,255,0.7)" },
                { p: "₩**", n: "Rustic Bronze Car", c: "rgba(255,255,255,0.7)" },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "2px 0", fontSize: 9, color: "rgba(255,255,255,0.8)" }}>
                  <span style={{ color: item.c, fontWeight: 700, minWidth: 22 }}>{item.p}</span>
                  <span style={{ fontWeight: 500 }}>{item.n}</span>
                </div>
              ))}
              {/* 하단: 메시지 입력 + 하트 */}
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6 }}>
                <div style={{ flex: 1, height: 22, borderRadius: 11, backgroundColor: "rgba(255,255,255,0.24)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)", display: "flex", alignItems: "center", padding: "0 10px" }}>
                  <span style={{ fontSize: 9, color: "rgba(255,255,255,0.5)" }}>메시지 입력</span>
                </div>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M11 19s-7.5-4.5-7.5-10c0-2.8 2.2-5 5-5 1.5 0 2.5.7 2.5.7s1-.7 2.5-.7c2.8 0 5 2.2 5 5 0 5.5-7.5 10-7.5 10z" stroke="rgba(255,255,255,0.5)" strokeWidth="1.2" fill="none" />
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* BOTTOM: 시나리오 */}
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px 32px" }}>
        <div style={{ backgroundColor: "#EFF6FF", borderRadius: 10, border: `1px solid ${C.g200}`, padding: "20px 24px" }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.g900, marginBottom: 4 }}>시나리오 전환</div>
          <div style={{ fontSize: 12, color: C.g400, marginBottom: 16 }}>시나리오 버튼 클릭 시 해당 상태로 예시 화면이 전환됩니다.</div>

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
            {scenarios.map((s, i) => (
              <button key={i} onClick={() => apply(i)} style={{
                flex: "1 1 180px", padding: "12px 14px", borderRadius: 8,
                border: `1.5px solid ${activeScenario === i ? C.primary : C.g200}`,
                backgroundColor: activeScenario === i ? C.primaryLight : C.white,
                cursor: "pointer", textAlign: "left", transition: "all 0.15s",
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: activeScenario === i ? C.primary : C.g700 }}>{s.name}</div>
                <div style={{ fontSize: 11, color: C.g500, marginTop: 2 }}>{s.desc}</div>
              </button>
            ))}
          </div>

          <div style={{ backgroundColor: C.g50, borderRadius: 8, padding: "14px 16px" }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.g700, marginBottom: 8 }}>현재 상태 설명</div>
            {activeScenario === 0 && (
              <div style={{ fontSize: 12, color: C.g600, lineHeight: 1.8 }}>
                <div>페이지: <strong style={{ color: C.g700 }}>라이브 일정 등록</strong></div>
                <div>자동자막 사용: <strong style={{ color: C.g700 }}>OFF (기본값)</strong></div>
                <div>자막 노출 항목: <strong style={{ color: C.g700 }}>미노출</strong> — 자동자막 OFF 시 자막 노출 토글 미표시</div>
              </div>
            )}
            {activeScenario === 1 && (
              <div style={{ fontSize: 12, color: C.g600, lineHeight: 1.8 }}>
                <div>페이지: <strong style={{ color: C.g700 }}>라이브 일정 등록</strong></div>
                <div>자동자막 사용: <strong style={{ color: C.primary }}>ON</strong> — 라이브 종료 후 VOD 변환 시 자막 자동 생성 예약</div>
                <div>자막 노출: <strong style={{ color: C.primary }}>ON (기본값)</strong> — 자막 생성 완료 시 VOD와 함께 자동 노출</div>
                <div>미리보기 자막: <strong style={{ color: C.g700 }}>미표시</strong> — 아직 자막이 생성되지 않은 상태</div>
              </div>
            )}
            {activeScenario === 2 && (
              <div style={{ fontSize: 12, color: C.g600, lineHeight: 1.8 }}>
                <div>페이지: <strong style={{ color: C.g700 }}>라이브 일정 수정</strong></div>
                <div>자동자막 사용: <strong style={{ color: C.primary }}>ON</strong> — 라이브 종료 후 VOD 변환 시 자막 자동 생성</div>
                <div>자막 노출: <strong style={{ color: C.primary }}>ON</strong> — 생성 완료 시 시청자에게 자막 노출</div>
                <div>미리보기 자막: <strong style={{ color: C.g700 }}>미표시</strong> — 아직 자막이 생성되지 않은 상태</div>
                <div style={{ marginTop: 6, padding: "6px 10px", backgroundColor: "#F0F9FF", borderRadius: 4, fontSize: 11, color: C.g600, lineHeight: 1.7 }}>
                  라이브 일정 단계에서는 아직 자막이 생성되지 않습니다. 라이브 종료 → VOD 변환 완료 후 자막이 자동 생성되며, 여기서 설정한 노출 여부가 적용됩니다.
                </div>
              </div>
            )}
            {activeScenario === 3 && (
              <div style={{ fontSize: 12, color: C.g600, lineHeight: 1.8 }}>
                <div>페이지: <strong style={{ color: C.g700 }}>라이브 일정 수정</strong></div>
                <div>자동자막 사용: <strong style={{ color: C.primary }}>ON</strong></div>
                <div>자막 노출: <strong style={{ color: C.g700 }}>OFF</strong> — 자막 생성 후 운영자 확인 후 수동으로 노출 전환 예정</div>
                <div>미리보기 자막: <strong style={{ color: C.g700 }}>숨김</strong></div>
                <div style={{ marginTop: 6, padding: "6px 10px", backgroundColor: "#F0F9FF", borderRadius: 4, fontSize: 11, color: C.g600, lineHeight: 1.7 }}>
                  자막 노출 OFF로 설정하면, 자막 생성 완료 후에도 시청자에게 노출되지 않습니다. VOD 콘텐츠 수정 페이지에서 자막을 확인/수정한 뒤 노출로 전환할 수 있습니다.
                </div>
              </div>
            )}
            {activeScenario === 4 && (
              <div style={{ fontSize: 12, color: C.g600, lineHeight: 1.8 }}>
                <div>페이지: <strong style={{ color: C.g700 }}>라이브 일정 수정 (라이브 종료)</strong></div>
                <div>자동자막 사용: <strong style={{ color: C.primary }}>ON</strong> (토글 비활성화) | 뱃지: <strong style={{ color: C.green600 }}>자막 생성완료</strong></div>
                <div>자막 노출: <strong style={{ color: C.primary }}>ON</strong> — 시청자에게 자막 노출 중</div>
                <div>미리보기 자막: <strong style={{ color: C.primary }}>표시됨</strong></div>
                <div style={{ marginTop: 6, padding: "6px 10px", backgroundColor: "#F0F9FF", borderRadius: 4, fontSize: 11, color: C.g600, lineHeight: 1.7 }}>
                  라이브 종료 후 VOD 변환 및 자막 생성이 완료된 상태입니다. 자동자막 사용 토글은 비활성화됩니다. 멀티 로그인 환경에서는 마지막으로 저장 성공한 것을 Override 합니다.
                </div>
                <div style={{ marginTop: 8, padding: "8px 10px", backgroundColor: "#FFF7ED", border: "1px solid #FDBA74", borderRadius: 4, fontSize: 11, color: "#9A3412", lineHeight: 1.7 }}>
                  <div style={{ fontWeight: 600, marginBottom: 2 }}>라이브 타입별 자막 확인 및 수정 정책</div>
                  <div>- 실시간 라이브: 자막 확인 및 수정 버튼 비노출. VOD 콘텐츠 수정 페이지에서 접근</div>
                  <div>- VOD 라이브 (추후 고도화): 원본 VOD의 자막을 복사하여 가져오며, 원본을 직접 수정하지 않고 자막 확인 및 수정 버튼을 통해 복사본을 별도 편집</div>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LiveSchedulePrototype />);
</script>
</body>
</html>

/* ── 시간 유틸 ── */
function timeToMs(hh,mm,ss,ms){
  return (parseInt(hh)||0)*3600000+(parseInt(mm)||0)*60000+(parseInt(ss)||0)*1000+(parseInt(ms)||0);
}
function msToFields(total){
  if(total<0)total=0;
  return {
    hh:String(Math.floor(total/3600000)).padStart(2,"0"),
    mm:String(Math.floor((total%3600000)/60000)).padStart(2,"0"),
    ss:String(Math.floor((total%60000)/1000)).padStart(2,"0"),
    ms:String(total%1000).padStart(3,"0"),
  };
}
function msToStr(total){const f=msToFields(total);return f.hh+":"+f.mm+":"+f.ss;}

/* ── 유효성 검증 ── */
function validateSubs(subs, vidMs){
  const errs={};
  subs.forEach((s,i)=>{
    const e={start:[],end:[],text:[]};
    // 포맷: 분>59, 초>59
    const sf=msToFields(s.startMs), ef=msToFields(s.endMs);
    if(parseInt(sf.mm)>59) e.start.push("분은 59 이하로 입력해 주세요.");
    if(parseInt(sf.ss)>59) e.start.push("초는 59 이하로 입력해 주세요.");
    if(parseInt(ef.mm)>59) e.end.push("분은 59 이하로 입력해 주세요.");
    if(parseInt(ef.ss)>59) e.end.push("초는 59 이하로 입력해 주세요.");
    // 영상 범위
    if(i===0 && s.startMs<0) e.start.push("시작 시간은 0 이상이어야 합니다.");
    if(i===subs.length-1 && s.endMs>vidMs) e.end.push("종료 시간이 영상 길이("+msToStr(vidMs)+")를 초과합니다.");
    // 시작 >= 종료
    if(s.startMs>=s.endMs) e.start.push("시작 시간이 종료 시간보다 크거나 같습니다.");
    // 겹침: 종료 > 다음 시작
    if(i<subs.length-1 && s.endMs>subs[i+1].startMs) e.end.push("종료 시간이 다음 자막의 시작 시간과 겹칩니다.");
    // 겹침: 시작 < 이전 종료
    if(i>0 && s.startMs<subs[i-1].endMs) e.start.push("시작 시간이 이전 자막의 종료 시간보다 앞섭니다.");
    // 텍스트 길이
    if(e.start.length||e.end.length) errs[s.id]=e;
  });
  return errs;
}

/* ── TimeInput 컴포넌트 (쇼츠 편집 스타일: HH:MM:SS.mmm + 꺽쇠 ±1초) ── */
function TimeInput({valueMs, onChange, hasError}){
  const hhRef=useRef(null);
  const mmRef=useRef(null);
  const ssRef=useRef(null);
  const msRef=useRef(null);
  const [focused,setFocused]=useState(false);

  const f=msToFields(valueMs);
  const [hh,setHh]=useState(f.hh);
  const [mm,setMm]=useState(f.mm);
  const [ss,setSs]=useState(f.ss);
  const [milliSec,setMilliSec]=useState(f.ms);

  useEffect(()=>{
    const f2=msToFields(valueMs);
    setHh(f2.hh);setMm(f2.mm);setSs(f2.ss);setMilliSec(f2.ms);
  },[valueMs]);

  const commit=(nh,nm,ns,nms)=>{
    onChange(timeToMs(nh,nm,ns,nms));
  };

  const handle=(field,val)=>{
    const maxL=field==="ms"?3:2;
    const cl=val.replace(/[^0-9]/g,"").slice(0,maxL);
    let nh=hh,nm=mm,ns=ss,nms=milliSec;
    if(field==="hh"){setHh(cl);nh=cl; if(cl.length>=2&&mmRef.current)mmRef.current.focus();}
    if(field==="mm"){setMm(cl);nm=cl; if(cl.length>=2&&ssRef.current)ssRef.current.focus();}
    if(field==="ss"){setSs(cl);ns=cl; if(cl.length>=2&&msRef.current)msRef.current.focus();}
    if(field==="ms"){setMilliSec(cl);nms=cl;}
    commit(nh,nm,ns,nms);
  };

  const handleKeyDown=(field,e,prevRef,nextRef)=>{
    if(e.key==="Tab"&&!e.shiftKey&&nextRef&&nextRef.current){
      e.preventDefault();nextRef.current.focus();nextRef.current.select();
    }
    if(e.key==="Tab"&&e.shiftKey&&prevRef&&prevRef.current){
      e.preventDefault();prevRef.current.focus();prevRef.current.select();
    }
    if(field!=="ms"){
      if(e.key==="ArrowUp"){e.preventDefault();onChange(Math.max(0,valueMs+1000));}
      if(e.key==="ArrowDown"){e.preventDefault();onChange(Math.max(0,valueMs-1000));}
    }
  };

  const stepUp=()=>{onChange(Math.max(0,valueMs+1000));};
  const stepDown=()=>{onChange(Math.max(0,valueMs-1000));};

  const bc=hasError?C.red500:(focused?C.primary:C.g200);

  const segStyle={
    width:20,border:"none",outline:"none",padding:0,margin:0,
    fontSize:12,fontVariantNumeric:"tabular-nums",color:C.g800,
    textAlign:"center",backgroundColor:"transparent",fontFamily:"inherit",
  };

  return(
    <div style={{
      display:"inline-flex",alignItems:"center",
      border:"1px solid "+bc,borderRadius:4,
      backgroundColor:C.white,padding:"3px 4px",gap:0,
      transition:"border-color 0.15s",
    }} onClick={e=>e.stopPropagation()}
      onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}>

      <input ref={hhRef} value={hh} onChange={e=>handle("hh",e.target.value)} style={segStyle}
        onKeyDown={e=>handleKeyDown("hh",e,null,mmRef)} onFocus={e=>e.target.select()} />
      <span style={{fontSize:12,color:C.g400,userSelect:"none"}}>:</span>
      <input ref={mmRef} value={mm} onChange={e=>handle("mm",e.target.value)} style={segStyle}
        onKeyDown={e=>handleKeyDown("mm",e,hhRef,ssRef)} onFocus={e=>e.target.select()} />
      <span style={{fontSize:12,color:C.g400,userSelect:"none"}}>:</span>
      <input ref={ssRef} value={ss} onChange={e=>handle("ss",e.target.value)} style={segStyle}
        onKeyDown={e=>handleKeyDown("ss",e,mmRef,msRef)} onFocus={e=>e.target.select()} />
      <span style={{fontSize:12,color:C.g400,userSelect:"none"}}>.</span>
      <input ref={msRef} value={milliSec} onChange={e=>handle("ms",e.target.value)} style={{...segStyle,width:26}}
        onKeyDown={e=>handleKeyDown("ms",e,ssRef,null)} onFocus={e=>e.target.select()} placeholder="000" />

      <div style={{display:"flex",flexDirection:"column",marginLeft:3,gap:0,flexShrink:0}}>
        <button onClick={stepUp} style={{
          width:14,height:12,border:"none",backgroundColor:"transparent",
          cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",
          color:hasError?C.red500:C.g400,fontSize:8,lineHeight:1,borderRadius:2,
        }} onMouseOver={e=>e.currentTarget.style.color=hasError?C.red500:C.g800}
           onMouseOut={e=>e.currentTarget.style.color=hasError?C.red500:C.g400}
           tabIndex={-1}>
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 5L5 1L9 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button onClick={stepDown} style={{
          width:14,height:12,border:"none",backgroundColor:"transparent",
          cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",
          color:hasError?C.red500:C.g400,fontSize:8,lineHeight:1,borderRadius:2,
        }} onMouseOver={e=>e.currentTarget.style.color=hasError?C.red500:C.g800}
           onMouseOut={e=>e.currentTarget.style.color=hasError?C.red500:C.g400}
           tabIndex={-1}>
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ── VideoPlayer 컴포넌트 (어드민 VOD 플레이어) ── */
const VIDEO_SRC = "https://raw.githubusercontent.com/kate-grip/prototypes/3ca45253020a5df6d58002ec4351c79e75d860fb/Assets/Cake_Rotation_Video_Generation.mp4";

function VideoPlayer({activeSub, progress, durFmt, currentTime}){
  const vidRef=useRef(null);
  const [playing,setPlaying]=useState(false);
  const [muted,setMuted]=useState(true);
  const [showControls,setShowControls]=useState(true);
  const hideTimer=useRef(null);

  const togglePlay=()=>{
    if(!vidRef.current)return;
    if(playing){vidRef.current.pause();}else{vidRef.current.play();}
    setPlaying(!playing);
  };
  const toggleMute=()=>{
    if(!vidRef.current)return;
    vidRef.current.muted=!muted;
    setMuted(!muted);
  };

  const handleMouseMove=()=>{
    setShowControls(true);
    clearTimeout(hideTimer.current);
    if(playing){
      hideTimer.current=setTimeout(()=>setShowControls(false),2500);
    }
  };

  const [progressHover,setProgressHover]=useState(false);

  return(
    <div style={{width:"100%",maxWidth:280,aspectRatio:"9/16",borderRadius:0,backgroundColor:"#000",position:"relative",overflow:"hidden",cursor:"pointer"}}
      onMouseMove={handleMouseMove} onMouseLeave={()=>{if(playing)setShowControls(false);}}>

      {/* 실제 비디오 */}
      <video ref={vidRef} src={VIDEO_SRC} muted={muted} loop playsInline
        style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}
        onClick={togglePlay} />

      {/* 자막 오버레이 */}
      {activeSub && (
        <div style={{position:"absolute",bottom:54,left:10,right:10,display:"flex",justifyContent:"center",animation:"subtitleFade 0.2s ease",zIndex:4,pointerEvents:"none"}}>
          <div style={{backgroundColor:"rgba(0,0,0,0.7)",borderRadius:4,padding:"5px 12px",fontSize:11,color:C.white,lineHeight:1.5,textAlign:"center",maxWidth:"92%"}}>{activeSub.text}</div>
        </div>
      )}

      {/* 하단 컨트롤 바 */}
      <div style={{
        position:"absolute",bottom:0,left:0,right:0,zIndex:5,
        background:"linear-gradient(0deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.3) 60%, transparent 100%)",
        padding:"24px 0 0",
        opacity:showControls?1:0,transition:"opacity 0.25s",
      }}>
        {/* 4개 아이콘: 균등 배치 */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-around",padding:"0 12px 6px"}}>
          <div onClick={e=>{e.stopPropagation();togglePlay();}} style={{cursor:"pointer",display:"flex",alignItems:"center",padding:4}}>
            {playing ? (
              <svg width="18" height="18" viewBox="0 0 16 16" fill="white"><rect x="3" y="2" width="3.5" height="12" rx="1"/><rect x="9.5" y="2" width="3.5" height="12" rx="1"/></svg>
            ) : (
              <svg width="18" height="18" viewBox="0 0 16 16" fill="white"><path d="M4 2l10 6-10 6V2z"/></svg>
            )}
          </div>
          <div onClick={e=>{e.stopPropagation();toggleMute();}} style={{cursor:"pointer",display:"flex",alignItems:"center",padding:4}}>
            {muted ? (
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10 3L5.5 7H3v6h2.5L10 17V3z"/>
                <line x1="15" y1="7" x2="15" y2="13" strokeOpacity="0.4"/>
                <line x1="18" y1="5.5" x2="18" y2="14.5" strokeOpacity="0.4"/>
                <line x1="1" y1="1" x2="19" y2="19" stroke="white" strokeWidth="1.5"/>
              </svg>
            ) : (
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10 3L5.5 7H3v6h2.5L10 17V3z"/>
                <line x1="15" y1="7" x2="15" y2="13"/>
                <line x1="18" y1="5.5" x2="18" y2="14.5"/>
              </svg>
            )}
          </div>
          <div style={{cursor:"pointer",display:"flex",alignItems:"center",padding:4}}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"/></svg>
          </div>
          <div style={{cursor:"pointer",display:"flex",alignItems:"center",padding:4}}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><circle cx="8" cy="3" r="1.3"/><circle cx="8" cy="8" r="1.3"/><circle cx="8" cy="13" r="1.3"/></svg>

        </div>
        {/* 프로그레스 바: 평상시 바만, 호버 시 thumb 표시 */}
        <div style={{padding:"0 12px 10px",display:"flex",alignItems:"center",gap:0,position:"relative"}}
          onMouseEnter={()=>setProgressHover(true)} onMouseLeave={()=>setProgressHover(false)}>
          <div style={{flex:1,height:progressHover?4:3,backgroundColor:"rgba(255,255,255,0.3)",borderRadius:2,position:"relative",transition:"height 0.15s",cursor:"pointer"}}>
            <div style={{height:"100%",width:(progress*100)+"%",backgroundColor:"rgba(255,255,255,0.6)",borderRadius:2,transition:"width 0.3s"}}/>
            {/* thumb: 호버 시에만 표시 */}
            <div style={{
              position:"absolute",top:"50%",left:"calc("+(progress*100)+"% - 5px)",
              width:10,height:10,borderRadius:"50%",backgroundColor:C.white,
              boxShadow:"0 1px 3px rgba(0,0,0,0.4)",transform:"translateY(-50%)",
              opacity:progressHover?1:0,transition:"opacity 0.15s",
            }}/>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 수정 내역 ── */
const CHANGELOG=[
  {date:"2026.03.12",items:[
    "VOD 콘텐츠 등록/수정 프로토타입에서 자막 확인 및 수정 모달만 분리",
    "미리보기 영상 플레이어 변경 (VOD 콘텐츠 수정과 동일)",
    "시간 입력 필드 UI 변경 (AI 쇼츠 구간 편집과 동일)",
    "자막 수정 유효성 체크 추가",
    "  - 영상 범위: 첫번째 자막 시작 ≥ 0, 마지막 자막 종료 ≤ 영상 길이",
    "  - 자막 내 시간 역전 방지: 시작 ≥ 종료 불가",
    "  - 자막 간 겹침 방지: 종료 > 다음 자막 시작 불가, 시작 < 이전 자막 종료 불가",
    "자막 텍스트 최대 40자 제한 + 입력 필드에 카운터 추가",
  ]},
  {date:"2026.03.04",items:["최초 공유 (VOD 콘텐츠 등록/수정 페이지 내 모달로 포함)"]},
];

function ChangelogModal({onClose}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,backgroundColor:"rgba(0,0,0,0.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{backgroundColor:"#fff",borderRadius:12,width:480,maxHeight:"70vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid #E5E5E5",flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:700,color:"#171717"}}>업데이트 히스토리</div>
          <svg onClick={onClose} width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="#737373" strokeWidth="1.5" strokeLinecap="round" style={{cursor:"pointer"}}><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
        </div>
        <div style={{overflow:"auto",padding:"16px 20px"}}>
          {CHANGELOG.map((log,i)=>(
            <div key={i} style={{marginBottom:i<CHANGELOG.length-1?16:0}}>
              <div style={{fontSize:13,fontWeight:600,color:"#2563EB",marginBottom:6}}>{log.date}</div>
              {log.items.map((item,j)=>{
                const isSub=item.startsWith("  - ");
                const text=isSub?item.slice(4):item;
                return(
                  <div key={j} style={{fontSize:12,color:"#525252",lineHeight:1.7,paddingLeft:isSub?22:10,position:"relative"}}>
                    <span style={{position:"absolute",left:isSub?12:0,color:"#A3A3A3"}}>{isSub?"·":"-"}</span>{text}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   메인: 자막 확인 및 수정 모달 (단독)
   ══════════════════════════════════════════════ */
function App(){
  const [subs,setSubs]=useState(SUBS_INIT);
  const [activeId,setActiveId]=useState(1);
  const [isDirty,setIsDirty]=useState(false);
  const listRef=useRef(null);

  // 찾기/바꾸기
  const [searchOpen,setSearchOpen]=useState(false);
  const [searchText,setSearchText]=useState("");
  const [replaceText,setReplaceText]=useState("");
  const [matchCount,setMatchCount]=useState(0);

  // 히스토리
  const [showCL,setShowCL]=useState(false);

  const errors=validateSubs(subs,VIDEO_DURATION_MS);
  const hasErrors=Object.keys(errors).length>0;

  useEffect(()=>{
    if(!searchText){setMatchCount(0);return;}
    setMatchCount(subs.filter(s=>s.text.includes(searchText)).length);
  },[searchText,subs]);

  const handleReplaceAll=()=>{
    if(!searchText)return;
    setSubs(p=>p.map(s=>({...s,text:s.text.split(searchText).join(replaceText)})));
    setIsDirty(true);setSearchText("");setReplaceText("");
  };

  const filteredSubs=searchText?subs.filter(s=>s.text.includes(searchText)):subs;
  const activeSub=subs.find(s=>s.id===activeId);

  const handleSubClick=(sub)=>{setActiveId(sub.id);};
  const handleTextChange=(id,val)=>{if(val.length>MAX_SUB_LEN)return;setSubs(p=>p.map(s=>s.id===id?{...s,text:val}:s));setIsDirty(true);};
  const handleTimeChange=(id,field,ms)=>{setSubs(p=>p.map(s=>s.id===id?{...s,[field]:ms}:s));setIsDirty(true);};

  const durFmt=(()=>{const f=msToFields(VIDEO_DURATION_MS);return f.hh+":"+f.mm+":"+f.ss;})();

  return(
    <div style={{fontFamily:'"Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif'}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes subtitleFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
      `}</style>

      {showCL && <ChangelogModal onClose={()=>setShowCL(false)}/>}

      {/* 딤 배경 + 모달 */}
      <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:"rgba(0,0,0,0.25)"}}>
        <div style={{width:"90vw",maxWidth:1060,height:"90vh",maxHeight:740,backgroundColor:C.white,borderRadius:12,display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",overflow:"hidden"}}>

          {/* ─── 모달 헤더 ─── */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:"1px solid "+C.g200,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16,fontWeight:700,color:C.g900}}>자막 확인 및 수정</span>
              <svg onClick={()=>setShowCL(true)} width="14" height="14" viewBox="0 0 20 20" fill="none" style={{cursor:"pointer",flexShrink:0}}>
                <circle cx="10" cy="10" r="8.5" stroke="#A3A3A3" strokeWidth="1.3"/>
                <polyline points="10,5 10,10 13.5,12" stroke="#A3A3A3" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
              </svg>
            </div>
            <button style={{width:28,height:28,border:"none",backgroundColor:"transparent",cursor:"pointer",fontSize:18,color:C.g400,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:4}}
              onMouseOver={e=>e.currentTarget.style.backgroundColor=C.g100} onMouseOut={e=>e.currentTarget.style.backgroundColor="transparent"}>✕</button>
          </div>

          {/* ─── 모달 바디 ─── */}
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>

            {/* ── 좌: 미리보기 (어드민 VOD 플레이어 임베드) ── */}
            <div style={{flex:"0 0 340px",display:"flex",flexDirection:"column",backgroundColor:C.white}}>
              <div style={{padding:"0 24px",height:42,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:13,fontWeight:600,color:C.g700}}>미리보기</span>
                <span style={{fontSize:11,color:C.g400}}>재생시간 {durFmt}</span>
              </div>
              <div style={{flex:1,padding:"0 24px 20px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <VideoPlayer activeSub={activeSub} progress={activeId/subs.length} durFmt={durFmt} currentTime={activeSub?msToStr(activeSub.startMs):"00:00:00"} />
                {/* 선택 자막 구간 정보 */}
                <div style={{marginTop:12,fontSize:12,color:C.g500,fontVariantNumeric:"tabular-nums"}}>
                  {activeSub ? (()=>{const s=msToFields(activeSub.startMs),e=msToFields(activeSub.endMs);return s.hh+":"+s.mm+":"+s.ss+"."+s.ms+" ~ "+e.hh+":"+e.mm+":"+e.ss+"."+e.ms;})() : "00:00:00.000 ~ 00:00:00.000"}
                </div>
              </div>
            </div>

            {/* ── 우: 자막 목록 ── */}
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",borderLeft:"1px solid "+C.g200}}>
              {/* 헤더 */}
              <div style={{padding:"0 20px",height:42,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                <span style={{fontSize:13,fontWeight:600,color:C.g700}}>자막 목록</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:12,color:C.g400}}>총 {subs.length}개</span>
                  {hasErrors && <span style={{fontSize:11,color:C.red500,fontWeight:600}}>오류 {Object.keys(errors).length}건</span>}
                  <button onClick={()=>setSearchOpen(!searchOpen)} style={{
                    padding:"4px 10px",borderRadius:4,fontSize:11,cursor:"pointer",
                    border:"1px solid "+(searchOpen?C.primary:C.g200),
                    backgroundColor:searchOpen?C.primaryLight:C.white,
                    color:searchOpen?C.primary:C.g600,
                  }}>{searchOpen?"닫기":"찾기 / 바꾸기"}</button>
                </div>
              </div>

              {/* 찾기/바꾸기 */}
              {searchOpen && (
                <div style={{padding:"0 20px 10px",flexShrink:0}}>
                  <div style={{display:"flex",flexDirection:"column",gap:6,padding:"10px 12px",backgroundColor:C.g50,borderRadius:6}}>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input type="text" placeholder="찾을 내용" value={searchText} onChange={e=>setSearchText(e.target.value)}
                        style={{flex:1,padding:"6px 10px",borderRadius:4,border:"1px solid "+C.g200,fontSize:12,outline:"none",backgroundColor:C.white}}
                        onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.g200}/>
                      {searchText && <span style={{fontSize:11,color:C.g400,flexShrink:0}}>{matchCount>0?matchCount+"건":"결과 없음"}</span>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input type="text" placeholder="바꿀 내용" value={replaceText} onChange={e=>setReplaceText(e.target.value)}
                        style={{flex:1,padding:"6px 10px",borderRadius:4,border:"1px solid "+C.g200,fontSize:12,outline:"none",backgroundColor:C.white}}
                        onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.g200}/>
                      <button onClick={handleReplaceAll} disabled={!searchText||matchCount===0}
                        style={{padding:"6px 12px",borderRadius:4,border:"none",flexShrink:0,fontSize:11,fontWeight:600,
                          cursor:searchText&&matchCount>0?"pointer":"not-allowed",
                          backgroundColor:searchText&&matchCount>0?C.primary:C.g200,
                          color:searchText&&matchCount>0?C.white:C.g400,
                        }}>모두 바꾸기</button>
                    </div>
                  </div>
                </div>
              )}

              {/* 자막 리스트 */}
              <div ref={listRef} style={{flex:1,overflow:"auto",padding:"8px 0"}}>
                {filteredSubs.map((sub)=>{
                  const idx=subs.findIndex(s=>s.id===sub.id);
                  const isActive=sub.id===activeId;
                  const err=errors[sub.id]||{start:[],end:[],text:[]};
                  const hasSE=err.start.length>0;
                  const hasEE=err.end.length>0;
                  const hasTE=err.text.length>0;
                  const durSec=Math.max(0,Math.round((sub.endMs-sub.startMs)/100)/10);

                  return(
                    <div key={sub.id} onClick={()=>handleSubClick(sub)} style={{
                      padding:"10px 20px",cursor:"pointer",
                      backgroundColor:isActive?C.primaryLight:"transparent",
                      borderLeft:"3px solid "+(isActive?C.primary:"transparent"),
                      transition:"all 0.15s",
                    }}
                    onMouseOver={e=>{if(!isActive)e.currentTarget.style.backgroundColor=C.g50;}}
                    onMouseOut={e=>{if(!isActive)e.currentTarget.style.backgroundColor="transparent";}}>

                      {/* 번호 + 시간 */}
                      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{
                          minWidth:22,height:22,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",
                          padding:"0 5px",flexShrink:0,fontSize:11,fontWeight:600,
                          backgroundColor:(hasSE||hasEE)?C.red50:(isActive?C.primary:C.g100),
                          color:(hasSE||hasEE)?C.red500:(isActive?C.white:C.g400),
                        }}>{idx+1}</span>

                        <TimeInput valueMs={sub.startMs} onChange={v=>handleTimeChange(sub.id,"startMs",v)} hasError={hasSE}/>
                        <span style={{fontSize:11,color:C.g400}}>~</span>
                        <TimeInput valueMs={sub.endMs} onChange={v=>handleTimeChange(sub.id,"endMs",v)} hasError={hasEE}/>

                        <span style={{fontSize:10,color:C.g400,backgroundColor:C.g100,padding:"2px 6px",borderRadius:8,marginLeft:"auto",whiteSpace:"nowrap"}}>{durSec}초</span>
                      </div>

                      {/* 시간 에러 */}
                      {(hasSE||hasEE) && (
                        <div style={{marginBottom:4,marginLeft:28}}>
                          {err.start.map((msg,i)=><div key={"se"+i} style={{fontSize:11,color:C.red500,lineHeight:1.6}}>시작: {msg}</div>)}
                          {err.end.map((msg,i)=><div key={"ee"+i} style={{fontSize:11,color:C.red500,lineHeight:1.6}}>종료: {msg}</div>)}
                        </div>
                      )}

                      {/* 텍스트 (인풋 내부에 카운터 포함, 40자 초과 입력 방지) */}
                      <div style={{position:"relative"}}>
                        <textarea value={sub.text} onChange={e=>handleTextChange(sub.id,e.target.value)} onClick={e=>e.stopPropagation()} rows={1}
                          style={{
                            width:"100%",padding:"8px 50px 8px 10px",borderRadius:6,
                            border:"1px solid "+(isActive?C.primary:"transparent"),
                            fontSize:13,lineHeight:1.5,color:C.g800,
                            resize:"none",outline:"none",fontFamily:"inherit",
                            backgroundColor:isActive?C.white:C.g50,
                          }}
                          onFocus={e=>{e.target.style.borderColor=C.primary;e.target.style.backgroundColor=C.white;}}
                          onBlur={e=>{if(!isActive){e.target.style.borderColor="transparent";e.target.style.backgroundColor=C.g50;}}}
                        />
                        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:10,color:C.g400,pointerEvents:"none"}}>{sub.text.length}/{MAX_SUB_LEN}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* ─── 모달 푸터 ─── */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 24px",borderTop:"1px solid "+C.g200,flexShrink:0}}>
            <div>
              {hasErrors && <span style={{fontSize:12,color:C.red500}}>유효성 오류 {Object.keys(errors).length}건이 있습니다. 수정 후 확인해 주세요.</span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{padding:"8px 20px",borderRadius:6,border:"1px solid "+C.g200,backgroundColor:C.white,fontSize:13,color:C.g600,cursor:"pointer"}}>취소</button>
              <button disabled={!isDirty||hasErrors} style={{
                padding:"8px 20px",borderRadius:6,border:"none",
                backgroundColor:(isDirty&&!hasErrors)?C.g900:C.g300,
                fontSize:13,fontWeight:600,color:C.white,
                cursor:(isDirty&&!hasErrors)?"pointer":"not-allowed",
                opacity:(isDirty&&!hasErrors)?1:0.5,transition:"all 0.15s",
              }}>확인</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

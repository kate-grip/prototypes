<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grip Cloud Prototypes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-width: 280px;
    --header-height: 56px;
    --bg: #ffffff;
    --sidebar-bg: #f7f8fa;
    --border: #e8e9ec;
    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --text-caption: #9ca3af;
    --accent: #1677FF;
    --accent-bg: #e8f1ff;
    --hover-bg: #f0f1f3;
    --tag-bg: #f0f1f3;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    height: var(--header-height);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    background: var(--bg);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }

  .header-logo {
    font-size: 15px;
    font-weight: 700;
    color: #003D99;
    letter-spacing: -0.3px;
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .header-count {
    font-size: 12px;
    color: var(--text-caption);
    margin-left: auto;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: calc(100vh - var(--header-height));
    margin-top: var(--header-height);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-caption);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 0;
  }

  .proto-item {
    display: block;
    padding: 10px 16px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }

  .proto-item:hover {
    background: var(--hover-bg);
  }

  .proto-item.active {
    background: var(--accent-bg);
    border-left-color: var(--accent);
  }

  .proto-item-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .active .proto-item-title {
    color: var(--accent);
  }

  .proto-item-meta {
    font-size: 11px;
    color: var(--text-caption);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .proto-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--tag-bg);
    color: var(--text-secondary);
  }

  .proto-tag.new-feature { background: #dbeafe; color: #1d4ed8; }
  .proto-tag.improvement { background: #d1fae5; color: #047857; }
  .proto-tag.admin { background: #fef3c7; color: #92400e; }
  .proto-tag.player { background: #ede9fe; color: #5b21b6; }

  /* ── Main viewer ── */
  .viewer {
    flex: 1;
    background: var(--bg);
    position: relative;
  }

  .viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .viewer-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-caption);
    gap: 8px;
  }

  .viewer-empty-icon {
    font-size: 40px;
    opacity: 0.3;
  }

  .viewer-empty-text {
    font-size: 14px;
  }

  .viewer-empty-sub {
    font-size: 12px;
  }

  /* ── Scrollbar ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<div class="header">
  <span class="header-logo">Grip Cloud</span>
  <span class="header-divider"></span>
  <span class="header-title">Prototypes</span>
  <span class="header-count" id="countLabel"></span>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="viewer" id="viewer">
    <div class="viewer-empty">
      <div class="viewer-empty-icon">◁</div>
      <div class="viewer-empty-text">좌측 목록에서 프로토타입을 선택하세요</div>
    </div>
  </main>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  프로토타입 목록 - 새 항목 추가 시 여기만 수정
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const prototypes = [
    {
      section: '진행 중',
      items: [
        {
          title: 'VOD 자동자막 - 어드민 설정 화면',
          file: 'vod-subtitle-prototype.html',
          tags: ['신규', '어드민'],
          date: '2026.03.04',
        },
      ],
    },
    {
      section: '완료',
      items: [
        // 완료된 프로토타입은 여기에 추가
        // {
        //   title: '알림 센터 드롭다운',
        //   file: 'notification-center.html',
        //   tags: ['개선', '어드민'],
        //   date: '2026.02.27',
        // },
      ],
    },
  ];
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const tagClassMap = {
    '신규': 'new-feature',
    '개선': 'improvement',
    '어드민': 'admin',
    '플레이어': 'player',
  };

  function render() {
    const sidebar = document.getElementById('sidebar');
    const countLabel = document.getElementById('countLabel');
    let totalCount = 0;
    let html = '';

    prototypes.forEach(section => {
      const visibleItems = section.items.filter(i => i.title);
      if (visibleItems.length === 0 && section.section === '완료') return;
      totalCount += visibleItems.length;

      html += '<div class="sidebar-section">';
      html += '<div class="sidebar-section-title">' + section.section + ' (' + visibleItems.length + ')</div>';
      html += '</div>';

      visibleItems.forEach(item => {
        const tags = item.tags.map(t =>
          '<span class="proto-tag ' + (tagClassMap[t] || '') + '">' + t + '</span>'
        ).join('');

        html += '<button class="proto-item" data-file="' + item.file + '">';
        html += '<div class="proto-item-title">' + item.title + '</div>';
        html += '<div class="proto-item-meta">' + tags + '<span>' + item.date + '</span></div>';
        html += '</button>';
      });
    });

    sidebar.innerHTML = html;
    countLabel.textContent = '총 ' + totalCount + '개';

    sidebar.querySelectorAll('.proto-item').forEach(btn => {
      btn.addEventListener('click', () => {
        sidebar.querySelectorAll('.proto-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('viewer').innerHTML =
          '<iframe src="' + btn.dataset.file + '"></iframe>';
      });
    });
  }

  render();
</script>

</body>
</html>

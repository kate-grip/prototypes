<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-width: 280px;
    --header-height: 56px;
    --bg: #ffffff;
    --sidebar-bg: #f8f7fc;
    --border: #e8e9ec;
    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --text-caption: #9ca3af;
    --accent: #7C3AED;
    --accent-bg: #f0ebff;
    --hover-bg: #f0f1f3;
    --tag-bg: #f0f1f3;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  .header {
    height: var(--header-height);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    background: var(--bg);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }
  .header-logo { height: 20px; display: block; }
  .header-logo img { height: 100%; display: block; }
  .header-divider { width: 1px; height: 20px; background: var(--border); }
  .header-title {
    font-size: 14px; font-weight: 500; color: #7C3AED;
    position: relative; cursor: default;
  }
  .header-title:hover::after {
    content: 'by Kate';
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    margin-top: 6px; padding: 4px 10px;
    background: #fff; color: #7C3AED; border: 1px solid #7C3AED;
    font-size: 11px; font-weight: 500; border-radius: 4px;
    white-space: nowrap; opacity: 0; animation: fadeIn 0.3s ease forwards;
  }
  .header-title:hover::before {
    content: '';
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    margin-top: 2px; border: 4px solid transparent; border-bottom-color: #7C3AED;
    opacity: 0; animation: fadeIn 0.3s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .header-count { font-size: 12px; color: var(--text-caption); }
  .header-slack {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-secondary); text-decoration: none;
    padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); transition: all 0.15s;
  }
  .header-slack:hover { background: var(--hover-bg); color: var(--text-primary); border-color: #d1d5db; }
  .header-slack svg { flex-shrink: 0; }

  .layout { display: flex; height: calc(100vh - var(--header-height)); margin-top: var(--header-height); }

  .sidebar {
    width: var(--sidebar-width); min-width: var(--sidebar-width);
    background: var(--sidebar-bg); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 0;
  }
  .sidebar-section { padding: 0 16px; margin-bottom: 8px; }
  .sidebar-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-caption);
    text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 0;
  }
  .proto-tag {
    font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
    background: var(--tag-bg); color: var(--text-secondary);
  }
  .proto-tag.new-feature { background: #fee2e2; color: #dc2626; }
  .proto-tag.improvement { background: #e0f2fe; color: #0284c7; }
  .proto-jira {
    font-size: 11px; color: #1677FF; text-decoration: none; font-weight: 500;
    display: inline-flex; align-items: center; gap: 3px; position: relative; z-index: 1;
  }
  .proto-jira:hover { text-decoration: underline; }

  .proto-group { padding: 10px 16px 6px; }
  .proto-group-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .proto-group-title { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.4; }
  .proto-group-meta { font-size: 11px; color: var(--text-caption); display: flex; gap: 8px; align-items: center; margin-top: 2px; }

  .proto-child {
    display: block; padding: 7px 16px 7px 32px; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
    font-family: inherit; transition: background 0.12s; border-left: 3px solid transparent;
  }
  .proto-child:hover { background: var(--hover-bg); }
  .proto-child.active { background: var(--accent-bg); border-left-color: var(--accent); }
  .proto-child-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); line-height: 1.4; }
  .proto-child.active .proto-child-title { color: var(--accent); font-weight: 600; }
  .proto-child-date { font-size: 10px; color: var(--text-caption); margin-top: 1px; }
  .proto-child-date.loading { color: transparent; }

  .viewer { flex: 1; background: var(--bg); position: relative; }
  .viewer iframe { width: 100%; height: 100%; border: none; }

  .viewer-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-caption); gap: 16px; padding: 40px;
  }
  .empty-illustration { width: 200px; height: 140px; position: relative; margin-bottom: 8px; }
  .empty-illustration .window {
    width: 140px; height: 96px; border-radius: 10px; border: 2px solid #e0e3e8;
    background: #f9fafb; position: absolute; left: 54%; top: 50%; transform: translate(-50%, -50%); overflow: hidden;
  }
  .empty-illustration .window-bar {
    height: 20px; background: #f0f1f3; border-bottom: 1px solid #e0e3e8;
    display: flex; align-items: center; padding: 0 8px; gap: 4px;
  }
  .empty-illustration .window-dot { width: 5px; height: 5px; border-radius: 50%; background: #d1d5db; }
  .empty-illustration .window-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .empty-illustration .window-line { height: 4px; border-radius: 2px; background: #e8e9ec; }
  .empty-illustration .window-line:nth-child(1) { width: 70%; }
  .empty-illustration .window-line:nth-child(2) { width: 90%; }
  .empty-illustration .window-line:nth-child(3) { width: 50%; }
  .empty-illustration .window-line:nth-child(4) { width: 80%; }
  .empty-illustration .window-line:nth-child(5) { width: 60%; }
  .empty-illustration .sidebar-mini {
    width: 44px; height: 96px; border-radius: 8px; border: 2px solid #ede9fe;
    background: #f5f3ff; position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  }
  .empty-illustration .sidebar-mini-bar { height: 20px; background: #ede9fe; border-bottom: 1px solid #c4b5fd; border-radius: 6px 6px 0 0; }
  .empty-illustration .sidebar-mini-items { padding: 6px 5px; display: flex; flex-direction: column; gap: 4px; }
  .empty-illustration .sidebar-mini-item { height: 4px; border-radius: 2px; background: #c4b5fd; }
  .empty-illustration .sidebar-mini-item.active-item { background: var(--accent); opacity: 0.5; }
  .empty-illustration .cursor {
    width: 20px; height: 20px; position: absolute; left: 30px; bottom: 16px;
    animation: cursorFloat 3s ease-in-out infinite;
  }
  @keyframes cursorFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-4px, -6px); } }
  .viewer-empty-text { font-size: 14px; font-weight: 500; color: var(--text-secondary); }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
</style>
</head>

  // ── CHANGELOG 날짜 추출 (각 파일에서 첫 번째 date:"YYYY.MM.DD" 패턴) ──
  async function fetchLatestDate(filePath) {
    try {
      const resp = await fetch(filePath);
      if (!resp.ok) return null;
      const text = await resp.text();
      const match = text.match(/date\s*:\s*["'](\d{4}\.\d{2}\.\d{2})["']/);
      return match ? match[1] : null;
    } catch (e) {
      return null;
    }
  }

  async function render() {
    const sidebar = document.getElementById('sidebar');
    const countLabel = document.getElementById('countLabel');

    // 1단계: 기본 렌더링 (날짜는 로딩 상태)
    let totalCount = 0;
    let html = '';

    prototypes.forEach(section => {
      const visibleGroups = section.groups.filter(g => g.children && g.children.length > 0);
      if (visibleGroups.length === 0 && section.section === '완료') return;

      visibleGroups.forEach(g => { totalCount += g.children.length; });

      html += '<div class="sidebar-section">';
      html += '<div class="sidebar-section-title">' + section.section + '</div>';
      html += '</div>';

      visibleGroups.forEach(group => {
        const tagHtml = group.tag
          ? '<span class="proto-tag ' + (tagClassMap[group.tag] || '') + '">' + group.tag + '</span>'
          : '';
        const jiraHtml = group.jira
          ? '<a class="proto-jira" href="https://gripcorp.atlassian.net/browse/' + group.jira + '" target="_blank" rel="noopener">' + group.jira + '</a>'
          : '';

        html += '<div class="proto-group">';
        html += '<div class="proto-group-header">';
        html += '<span class="proto-group-title">' + group.feature + '</span>';
        html += tagHtml;
        html += '</div>';
        html += '<div class="proto-group-meta">' + jiraHtml + '</div>';
        html += '</div>';

        group.children.forEach(child => {
          const pathId = child.path || child.file.replace('.html', '');
          html += '<div class="proto-child" data-file="' + child.file + '" data-path="' + pathId + '">';
          html += '<div class="proto-child-title">' + child.title + '</div>';
          html += '<div class="proto-child-date loading" data-dateof="' + child.file + '">불러오는 중...</div>';
          html += '</div>';
        });
      });
    });

    sidebar.innerHTML = html;
    countLabel.textContent = '총 ' + totalCount + '개';
    bindClicks();

    // 해시가 있으면 해당 프로토타입 자동 선택
    if (window.location.hash) {
      selectByPath(window.location.hash.slice(1));
    }

    // 2단계: 각 파일에서 날짜 비동기 추출 후 업데이트 + 정렬
    const allChildren = [];
    prototypes.forEach(section => {
      section.groups.forEach(group => {
        group.children.forEach(child => {
          allChildren.push(child);
        });
      });
    });

    await Promise.all(allChildren.map(async (child) => {
      const date = await fetchLatestDate(child.file);
      child._fetchedDate = date || '알 수 없음';
      // DOM 업데이트
      const dateEl = sidebar.querySelector('.proto-child-date[data-dateof="' + child.file + '"]');
      if (dateEl) {
        dateEl.textContent = child._fetchedDate;
        dateEl.classList.remove('loading');
      }
    }));

    // 3단계: 날짜 기준 최신순 정렬 후 DOM 재정렬
    prototypes.forEach(section => {
      section.groups.forEach(group => {
        group.children.sort((a, b) => {
          const da = (a._fetchedDate || '').replace(/\./g, '');
          const db = (b._fetchedDate || '').replace(/\./g, '');
          return db.localeCompare(da); // 내림차순 (최신순)
        });
      });
    });

    // 정렬된 순서로 DOM 재정렬
    prototypes.forEach(section => {
      section.groups.forEach(group => {
        // 해당 그룹의 proto-group 다음에 나오는 proto-child들을 찾아 재배치
        const groupChildren = group.children.map(child => {
          const pathId = child.path || child.file.replace('.html', '');
          return sidebar.querySelector('.proto-child[data-path="' + pathId + '"]');
        }).filter(Boolean);

        if (groupChildren.length > 1) {
          const parent = groupChildren[0].parentNode;
          const refNode = groupChildren[groupChildren.length - 1].nextSibling;
          groupChildren.forEach(el => {
            parent.insertBefore(el, refNode);
          });
        }
      });
    });

    bindClicks();
  }

  function selectByPath(path) {
    const sidebar = document.getElementById('sidebar');
    const target = sidebar.querySelector('.proto-child[data-path="' + path + '"]');
    if (target) {
      sidebar.querySelectorAll('.proto-child').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      document.getElementById('viewer').innerHTML =
        '<iframe src="' + target.dataset.file + '"></iframe>';
    }
  }

  function bindClicks() {
    const sidebar = document.getElementById('sidebar');
    sidebar.querySelectorAll('.proto-child').forEach(btn => {
      btn.onclick = (e) => {
        sidebar.querySelectorAll('.proto-child').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const path = btn.dataset.path;
        window.location.hash = path;
        document.getElementById('viewer').innerHTML =
          '<iframe src="' + btn.dataset.file + '"></iframe>';
      };
    });
  }

  render();

  window.addEventListener('hashchange', () => {
    if (window.location.hash) {
      selectByPath(window.location.hash.slice(1));
    }
  });
</script>

</body>
</html>

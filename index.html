<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grip Cloud Prototypes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-width: 280px;
    --header-height: 56px;
    --bg: #ffffff;
    --sidebar-bg: #f7f8fa;
    --border: #e8e9ec;
    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --text-caption: #9ca3af;
    --accent: #1677FF;
    --accent-bg: #e8f1ff;
    --hover-bg: #f0f1f3;
    --tag-bg: #f0f1f3;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    height: var(--header-height);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    background: var(--bg);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }

  .header-logo {
    font-size: 15px;
    font-weight: 700;
    color: #003D99;
    letter-spacing: -0.3px;
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-count {
    font-size: 12px;
    color: var(--text-caption);
  }

  .header-slack {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }

  .header-slack:hover {
    background: var(--hover-bg);
    color: var(--text-primary);
    border-color: #d1d5db;
  }

  .header-slack svg {
    flex-shrink: 0;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: calc(100vh - var(--header-height));
    margin-top: var(--header-height);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-caption);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 0;
  }

  .proto-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--tag-bg);
    color: var(--text-secondary);
  }

  .proto-tag.new-feature { background: #fee2e2; color: #dc2626; }
  .proto-tag.improvement { background: #e0f2fe; color: #0284c7; }

  .proto-jira {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    position: relative;
    z-index: 1;
  }

  .proto-jira:hover {
    text-decoration: underline;
  }

  /* ── Group (1depth) ── */
  .proto-group {
    padding: 10px 16px 6px;
  }

  .proto-group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .proto-group-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .proto-group-meta {
    font-size: 11px;
    color: var(--text-caption);
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 2px;
  }

  /* ── Child item (2depth) ── */
  .proto-child {
    display: block;
    padding: 7px 16px 7px 32px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }

  .proto-child:hover {
    background: var(--hover-bg);
  }

  .proto-child.active {
    background: var(--accent-bg);
    border-left-color: var(--accent);
  }

  .proto-child-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .proto-child.active .proto-child-title {
    color: var(--accent);
    font-weight: 600;
  }

  .proto-child-area {
    font-size: 10px;
    color: var(--text-caption);
    margin-top: 1px;
  }

  /* ── Main viewer ── */
  .viewer {
    flex: 1;
    background: var(--bg);
    position: relative;
  }

  .viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── Empty state ── */
  .viewer-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-caption);
    gap: 16px;
    padding: 40px;
  }

  .empty-illustration {
    width: 200px;
    height: 140px;
    position: relative;
    margin-bottom: 8px;
  }

  .empty-illustration .window {
    width: 140px;
    height: 96px;
    border-radius: 10px;
    border: 2px solid #e0e3e8;
    background: #f9fafb;
    position: absolute;
    left: 54%;
    top: 50%;
    transform: translate(-50%, -50%);
    overflow: hidden;
  }

  .empty-illustration .window-bar {
    height: 20px;
    background: #f0f1f3;
    border-bottom: 1px solid #e0e3e8;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 4px;
  }

  .empty-illustration .window-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #d1d5db;
  }

  .empty-illustration .window-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .empty-illustration .window-line {
    height: 4px;
    border-radius: 2px;
    background: #e8e9ec;
  }

  .empty-illustration .window-line:nth-child(1) { width: 70%; }
  .empty-illustration .window-line:nth-child(2) { width: 90%; }
  .empty-illustration .window-line:nth-child(3) { width: 50%; }
  .empty-illustration .window-line:nth-child(4) { width: 80%; }
  .empty-illustration .window-line:nth-child(5) { width: 60%; }

  .empty-illustration .sidebar-mini {
    width: 44px;
    height: 96px;
    border-radius: 8px;
    border: 2px solid #dbeafe;
    background: #eff6ff;
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
  }

  .empty-illustration .sidebar-mini-bar {
    height: 20px;
    background: #dbeafe;
    border-bottom: 1px solid #bfdbfe;
    border-radius: 6px 6px 0 0;
  }

  .empty-illustration .sidebar-mini-items {
    padding: 6px 5px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .empty-illustration .sidebar-mini-item {
    height: 4px;
    border-radius: 2px;
    background: #bfdbfe;
  }

  .empty-illustration .sidebar-mini-item.active-item {
    background: var(--accent);
    opacity: 0.5;
  }

  .empty-illustration .cursor {
    width: 20px;
    height: 20px;
    position: absolute;
    left: 30px;
    bottom: 16px;
    animation: cursorFloat 3s ease-in-out infinite;
  }

  @keyframes cursorFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-4px, -6px); }
  }

  .viewer-empty-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  /* ── Scrollbar ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<div class="header">
  <span class="header-logo">Grip Cloud</span>
  <span class="header-divider"></span>
  <span class="header-title">Prototypes</span>
  <div class="header-right">
    <span class="header-count" id="countLabel"></span>
    <a class="header-slack" href="https://grip-corp.slack.com/team/U070Q44981K" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M14 20.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5z"/><path d="M10 9.5C10 10.33 9.33 11 8.5 11h-5C2.67 11 2 10.33 2 9.5S2.67 8 3.5 8h5c.83 0 1.5.67 1.5 1.5z"/><path d="M10 3.5C10 4.33 9.33 5 8.5 5S7 4.33 7 3.5 7.67 2 8.5 2s1.5.67 1.5 1.5z"/></svg>
      슬랙으로 문의하기
    </a>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="viewer" id="viewer">
    <div class="viewer-empty">
      <div class="empty-illustration">
        <!-- 미니 사이드바 -->
        <div class="sidebar-mini">
          <div class="sidebar-mini-bar"></div>
          <div class="sidebar-mini-items">
            <div class="sidebar-mini-item active-item"></div>
            <div class="sidebar-mini-item"></div>
            <div class="sidebar-mini-item"></div>
            <div class="sidebar-mini-item"></div>
          </div>
        </div>
        <!-- 윈도우 -->
        <div class="window">
          <div class="window-bar">
            <div class="window-dot"></div>
            <div class="window-dot"></div>
            <div class="window-dot"></div>
          </div>
          <div class="window-body">
            <div class="window-line"></div>
            <div class="window-line"></div>
            <div class="window-line"></div>
            <div class="window-line"></div>
            <div class="window-line"></div>
          </div>
        </div>
        <!-- 커서 -->
        <svg class="cursor" viewBox="0 0 24 24" fill="none">
          <path d="M5 3l14 8-6 2-4 6-4-16z" fill="#1677FF" opacity="0.6"/>
        </svg>
      </div>
      <div class="viewer-empty-text">좌측 목록에서 프로토타입을 선택하세요.</div>
    </div>
  </main>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  프로토타입 목록 - 새 항목 추가 시 여기만 수정
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const prototypes = [
    {
      section: '진행 중',
      groups: [
        {
          feature: 'VOD 자동자막',
          tag: '신규',
          jira: 'PSC-2483',
          children: [
            {
              title: 'VOD 콘텐츠 등록/수정',
              file: 'vod-cc_admin_vod-contents.html',
              date: '2026.03.04',
            },
            // {
            //   title: '플레이어 자막 표시',
            //   file: 'vod-subtitle-player.html',
            //   date: '2026.03.10',
            // },
          ],
        },
      ],
    },
    {
      section: '완료',
      groups: [
        // 완료된 기능 그룹은 여기에 추가
        // {
        //   feature: '알림 센터',
        //   tag: '고도화',
        //   jira: 'PSC-2876',
        //   children: [
        //     {
        //       title: '어드민 드롭다운',
        //       file: 'notification-center.html',
        //       date: '2026.02.27',
        //     },
        //   ],
        // },
      ],
    },
  ];
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const tagClassMap = {
    '신규': 'new-feature',
    '고도화': 'improvement',
  };

  function render() {
    const sidebar = document.getElementById('sidebar');
    const countLabel = document.getElementById('countLabel');
    let totalCount = 0;
    let html = '';

    prototypes.forEach(section => {
      const visibleGroups = section.groups.filter(g => g.children && g.children.length > 0);
      if (visibleGroups.length === 0 && section.section === '완료') return;

      visibleGroups.forEach(g => { totalCount += g.children.length; });

      html += '<div class="sidebar-section">';
      html += '<div class="sidebar-section-title">' + section.section + '</div>';
      html += '</div>';

      visibleGroups.forEach(group => {
        const tagHtml = group.tag
          ? '<span class="proto-tag ' + (tagClassMap[group.tag] || '') + '">' + group.tag + '</span>'
          : '';

        const jiraHtml = group.jira
          ? '<a class="proto-jira" href="https://gripcorp.atlassian.net/browse/' + group.jira + '" target="_blank" rel="noopener">' + group.jira + '</a>'
          : '';

        html += '<div class="proto-group">';
        html += '<div class="proto-group-header">';
        html += '<span class="proto-group-title">' + group.feature + '</span>';
        html += tagHtml;
        html += '</div>';
        html += '<div class="proto-group-meta">' + jiraHtml + '</div>';
        html += '</div>';

        group.children.forEach(child => {
          html += '<div class="proto-child" data-file="' + child.file + '">';
          html += '<div class="proto-child-title">' + child.title + '</div>';
          html += '<div class="proto-child-area">' + child.date + '</div>';
          html += '</div>';
        });
      });
    });

    sidebar.innerHTML = html;
    countLabel.textContent = '총 ' + totalCount + '개';

    sidebar.querySelectorAll('.proto-child').forEach(btn => {
      btn.addEventListener('click', (e) => {
        sidebar.querySelectorAll('.proto-child').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('viewer').innerHTML =
          '<iframe src="' + btn.dataset.file + '"></iframe>';
      });
    });
  }

  render();
</script>

</body>
</html>

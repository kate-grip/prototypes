 */
const C = {
  primary: "#1677FF", primaryLight: "#E6F4FF", bg: "#F9F9F9", white: "#FFFFFF",
  g50: "#FAFAFA", g100: "#F0F0F0", g200: "#E4E5E7", g300: "#AFB0B2",
  g400: "#B0B0B0", g500: "#888888", g600: "#6C6C6C", g700: "#666666",
  g800: "#222222", g900: "#222222",
  amber50: "#FFFBEB", amber500: "#F59E0B", amber700: "#B45309",
  green50: "#F6FFED", green600: "#52C41A", green700: "#52C41A",
  blue50: "#E6F4FF", blue600: "#1677FF",
  red50: "#FFF1F0", red600: "#F23526",
  negative2: "#FF4D4F",
  secondary: "#508EFF",
  primaryNormal: "#003D99",
};

// ── 배지 컴포넌트 ──
function StatusBadge({ label, color = "gray" }) {
  const colors = {
    gray:   { bg: C.g100, text: C.g600 },
    blue:   { bg: C.blue50, text: C.blue600 },
    green:  { bg: C.green50, text: C.green700 },
    red:    { bg: C.red50, text: C.red600 },
  };
  const c = colors[color] || colors.gray;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", padding: "2px 6px",
      borderRadius: 4, fontSize: 11, fontWeight: 500,
      backgroundColor: c.bg, color: c.text, whiteSpace: "nowrap",
    }}>{label}</span>
  );
}

function SubtitleBadge({ status }) {
  if (!status) return null;
  const isGen = status === "generating";
  const isFailed = status === "failed";
  const bgColor = isGen ? C.amber50 : isFailed ? "rgba(245,34,45,0.15)" : "rgba(128,226,126,0.2)";
  const textColor = isGen ? C.amber700 : isFailed ? "#F23526" : "#4CAF50";
  const label = isGen ? "자막 생성중" : isFailed ? "자막 생성실패" : "자막 생성완료";
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: "3px 12px", borderRadius: 4, fontSize: 10, fontWeight: 700,
      backgroundColor: bgColor, color: textColor,
      whiteSpace: "nowrap",
    }}>
      {isGen && <span style={{ width: 5, height: 5, borderRadius: "50%", backgroundColor: C.amber500, animation: "pulse 1.5s ease-in-out infinite" }} />}
      {label}
    </span>
  );
}

          <span style={{ fontSize: 12, color: "#222", cursor: "pointer" }}>로그아웃</span>
        </div>
      </div>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* LNB (피그마 기반) */}
        <div className="lnb-scroll" style={{ width: 220, backgroundColor: C.white, borderRight: "1px solid #f0f0f0", overflowY: "auto", flexShrink: 0, display: "flex", flexDirection: "column" }}>
          <div style={{ flex: 1, paddingTop: 8 }}>
            {/* 서비스 선택 (권한 상속) */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px 6px 16px", marginBottom: 4 }}>
              {/* Grip Cloud 원형 로고 */}
              <div style={{ width: 24, height: 24, borderRadius: "50%", background: "#003D99", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <span style={{ fontSize: 5, fontWeight: 700, color: "#fff", lineHeight: 1, textAlign: "center", letterSpacing: -0.2 }}>Grip<br/>Cloud</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 4, flex: 1, minWidth: 0 }}>
                {/* 왕관 아이콘 */}
                <svg width="9" height="7" viewBox="0 0 11 9" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M1.5 7.5H9.5L10.5 3L7.5 5L5.5 1L3.5 5L0.5 3L1.5 7.5Z" fill="#508EFF"/>
                  <rect x="1.5" y="7.5" width="8" height="1" rx="0.5" fill="#508EFF"/>
                </svg>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#1677FF", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>그립 클라우드 라이브</span>
              </div>
              {/* 셰브론 */}
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                <path d="M6 4L10 8L6 12" stroke="#1677FF" strokeWidth="1.4" strokeLinecap="square"/>
              </svg>
            </div>
            {/* 메뉴 섹션 */}
            {lnbSections.map((sec, si) => (
              <div key={si} style={{ padding: "8px 16px" }}>
                <div onClick={() => setExpanded(p => ({ ...p, [sec.key]: !p[sec.key] }))} style={{ display: "flex", alignItems: "center", padding: "6px 4px", cursor: "pointer" }}>
                  <span style={{ flex: 1, fontSize: 13, fontWeight: 700, color: "#222", lineHeight: "16px" }}>{sec.title}</span>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ transition: "transform 0.2s", transform: expanded[sec.key] ? "rotate(180deg)" : "rotate(0deg)" }}>
                    <path d="M5 6.5L8 9.5L11 6.5" stroke="#AFB0B2" strokeWidth="1.4" strokeLinecap="square"/>
                  </svg>
                </div>
                {expanded[sec.key] && sec.items.map((item, ii) => {
                  const isActive = item === ACTIVE_MENU;
                  return (
                    <div key={ii} style={{
                      padding: "8px 4px", fontSize: 13, lineHeight: "16px", cursor: "pointer", borderRadius: 4,
                      fontWeight: isActive ? 600 : 400,
                      color: isActive ? "#222" : "#6c6c6c",
                      backgroundColor: isActive ? "#E0E8F8" : "transparent",
                    }}>{item}</div>
                  );
                })}
              </div>
            ))}
          </div>
          {/* FAQ */}
          <div style={{ padding: "16px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "8px 4px", cursor: "pointer" }}>
              <span style={{ fontSize: 13, color: "#888" }}>FAQ</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 4H12V10" stroke="#AFB0B2" strokeWidth="1.2" strokeLinecap="round"/>
                <path d="M12 4L4 12" stroke="#AFB0B2" strokeWidth="1.2" strokeLinecap="round"/>
              </svg>
            </div>
          </div>
          {/* Copyright */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px" }}>
            <span style={{ fontSize: 10, color: "#888" }}>© Copyright GRIP 2018 Ltd</span>
          </div>
        </div>

        {/* MAIN CONTENT */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", backgroundColor: C.white }}>
          {/* 페이지 타이틀 바: 높이 60px 고정 */}
          <div style={{ height: 60, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 24px", backgroundColor: C.white, borderBottom: "1px solid #EEEEEE" }}>
            <h1 style={{ fontSize: 20, fontWeight: 700, color: C.g900 }}>VOD 콘텐츠</h1>
            <button style={{ padding: "6px 14px", borderRadius: 4, border: "none", backgroundColor: C.primary, fontSize: 12, color: C.white, fontWeight: 400, cursor: "pointer" }}>VOD 콘텐츠 등록</button>
          </div>
          <div style={{ flex: 1, padding: "0 24px 24px", overflowY: "auto", backgroundColor: C.white }}>

            {/* 필터 영역 */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", padding: "12px 16px", margin: "16px 0 12px", backgroundColor: C.g50, borderRadius: 4 }}>
              <span style={{ fontSize: 12, color: C.g800, fontWeight: 500 }}>VOD 타입</span>
              <select style={{ fontSize: 12, padding: "6px 28px 6px 10px", border: `1px solid ${C.g200}`, borderRadius: 4, color: C.g700, backgroundColor: C.white, minWidth: 120, appearance: "auto" }}>
                <option>전체</option><option>라이브</option><option>업로드</option>
              </select>
              <span style={{ fontSize: 12, color: C.g800, fontWeight: 500 }}>공개여부</span>
              <select style={{ fontSize: 12, padding: "6px 28px 6px 10px", border: `1px solid ${C.g200}`, borderRadius: 4, color: C.g700, backgroundColor: C.white, minWidth: 120, appearance: "auto" }}>
                <option>전체</option>
              </select>
              <div style={{ display: "flex", alignItems: "center", gap: 4, border: `1px solid ${C.g200}`, borderRadius: 4, backgroundColor: C.white, padding: "0 8px" }}>
                <select style={{ fontSize: 12, padding: "6px 4px", border: "none", color: C.g700, appearance: "auto", backgroundColor: "transparent" }}>
                  <option>등록일시</option>
                </select>
                <span style={{ color: C.g200 }}>|</span>
                <input type="text" value="2025/03/05" readOnly style={{ fontSize: 12, padding: "6px 4px", border: "none", width: 80, color: C.g700, backgroundColor: "transparent" }} />
                <span style={{ fontSize: 12, color: C.g400 }}>~</span>
                <input type="text" value="2026/03/05" readOnly style={{ fontSize: 12, padding: "6px 4px", border: "none", width: 80, color: C.g700, backgroundColor: "transparent" }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 4, border: `1px solid ${C.g200}`, borderRadius: 4, backgroundColor: C.white, padding: "0 8px", flex: 1, minWidth: 200 }}>
                <select style={{ fontSize: 12, padding: "6px 4px", border: "none", color: C.g700, appearance: "auto", backgroundColor: "transparent" }}>
                  <option>제목</option>
                </select>
                <span style={{ color: C.g200 }}>|</span>
                <input type="text" placeholder="검색어를 입력하세요." style={{ fontSize: 12, padding: "6px 4px", border: "none", flex: 1, color: C.g700, backgroundColor: "transparent", outline: "none" }} />
              </div>
              {/* 검색 (필타입) */}
              <button style={{ width: 32, height: 32, border: "none", borderRadius: 4, backgroundColor: C.g800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
              </button>
              {/* 초기화 (라인타입) */}
              <button style={{ width: 32, height: 32, border: `1px solid ${C.g200}`, borderRadius: 4, backgroundColor: C.white, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.g800} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
              </button>
            </div>

            {/* 삭제 + 페이징 툴바 */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <button disabled style={{ padding: "5px 12px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 12, color: C.g400, cursor: "not-allowed" }}>삭제</button>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: C.g500 }}>총 61개</span>
                <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
                  <span style={{ fontSize: 12, color: C.g300, padding: "2px 6px" }}>&lt;</span>
                  <span style={{ fontSize: 12, color: C.primary, backgroundColor: C.white, padding: "2px 8px", borderRadius: 4, fontWeight: 600, border: `1px solid ${C.primary}` }}>1</span>
                  {[2,3,4].map(n => <span key={n} style={{ fontSize: 12, color: C.g500, padding: "2px 8px", cursor: "pointer", border: `1px solid ${C.g200}`, borderRadius: 4 }}>{n}</span>)}
                  <span style={{ fontSize: 12, color: C.g500, padding: "2px 6px", cursor: "pointer" }}>&gt;</span>
                </div>
                <select style={{ fontSize: 12, padding: "4px 8px", border: `1px solid ${C.g200}`, borderRadius: 4, color: C.g600, appearance: "auto" }}>
                  <option>20 / 페이지</option>
                </select>
                <button style={{ padding: "5px 12px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 12, color: C.g600, cursor: "pointer" }}>서비스 사용량</button>
                <button style={{ padding: "5px 12px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 12, color: C.g600, cursor: "pointer" }}>VOD 목록 다운로드</button>
              </div>
            </div>

            {/* 테이블 (운영 HTML 구조 기반) */}
            <div style={{ backgroundColor: C.white, border: `1px solid ${C.g200}`, overflow: "auto" }}>
              <table style={{ width: "100%", minWidth: 1200, borderCollapse: "collapse", tableLayout: "fixed" }}>
                <colgroup>
                  <col style={{ width: 32 }} />
                  <col style={{ width: 80 }} />
                  <col style={{ width: 120 }} />
                  <col />
                  <col style={{ width: 140 }} />
                  <col style={{ width: 150 }} />
                  <col style={{ width: 140 }} />
                  <col style={{ width: 120 }} />
                  <col style={{ width: 120 }} />
                </colgroup>
                <thead>
                  <tr style={{ backgroundColor: "#FAFAFA", borderBottom: `1px solid ${C.g200}` }}>
                    <th style={{ padding: "10px 8px", textAlign: "center" }}><input type="checkbox" style={{ width: 14, height: 14 }} /></th>
                    <th style={{ padding: "10px 8px" }}></th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500, textAlign: "center" }}>커버 이미지</th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500 }}>제목</th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500, textAlign: "center" }}>VOD라이브</th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500, textAlign: "center" }}>쇼츠</th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500, textAlign: "center" }}>채널 아이디</th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500, textAlign: "center" }}>시작일시</th>
                    <th style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: C.g500, textAlign: "center" }}>등록일시</th>
                  </tr>
                </thead>
                <tbody>
                  {baseRows.map((row) => {
                    const isHighlight = row.id === highlightId;
                    return (
                      <tr key={row.id} data-row-id={row.id} style={{
                        borderBottom: `1px solid ${C.g100}`,
                        backgroundColor: C.white,
                        outline: isHighlight ? `2px solid ${C.primary}` : "none",
                        outlineOffset: -2,
                        transition: "all 0.2s",
                      }}>
                        {/* 체크박스 */}
                        <td style={{ padding: "12px 8px", textAlign: "center", verticalAlign: "middle" }}><input type="checkbox" style={{ width: 14, height: 14 }} /></td>

                        {/* 수정/결과 버튼 */}
                        <td style={{ padding: "16px 5px", verticalAlign: "middle" }}>
                          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                            <button style={{ padding: "4px 6px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 11, color: C.g600, cursor: "pointer", whiteSpace: "nowrap" }}>수정</button>
                            <button style={{ padding: "4px 6px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 11, color: C.g600, cursor: "pointer", display: "flex", alignItems: "center", gap: 2, justifyContent: "center", whiteSpace: "nowrap" }}>결과 <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>
                          </div>
                        </td>

                        {/* 커버 이미지 (9:16) */}
                        <td style={{ padding: "16px 5px", textAlign: "center", verticalAlign: "middle" }}>
                          <img src={row.cover || COVER} alt="" style={{ width: 62, height: 110, borderRadius: 4, objectFit: "contain", border: "1px solid #eee", backgroundColor: "#f9f9f9", display: "block", margin: "0 auto" }} />
                        </td>

                        {/* 제목 + 배지 */}
                        <td style={{ padding: "12px 8px", verticalAlign: "middle" }}>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 4 }}>
                            {row.typeBadges.map((b, bi) => {
                              const badgeColors = { blue: { bg: "rgba(106,161,255,0.2)", c: "#1677FF" }, red: { bg: "rgba(245,34,45,0.15)", c: "#F5222D" }, gray: { bg: "#F5F5F5", c: "#8C8C8C" }, green: { bg: "rgba(128,226,126,0.2)", c: "#4CAF50" } };
                              const bc = badgeColors[b.color] || badgeColors.gray;
                              return <span key={bi} style={{ fontSize: 10, padding: "3px 12px", borderRadius: 4, backgroundColor: bc.bg, color: bc.c, fontWeight: 700 }}>{b.label}</span>;
                            })}
                            {row.subtitleStatus && <SubtitleBadge status={row.subtitleStatus} />}
                          </div>
                          <div style={{ fontSize: 13, color: C.g800, fontWeight: 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.5 }}>
                            {row.title}
                          </div>
                        </td>

                        {/* VOD라이브 */}
                        <td style={{ padding: "12px 8px", textAlign: "center", verticalAlign: "middle" }}>
                          <button disabled={!row.vodLiveEnabled} style={{ padding: "6px 10px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 13, color: row.vodLiveEnabled ? C.g700 : C.g400, cursor: row.vodLiveEnabled ? "pointer" : "default" }}>VOD라이브</button>
                        </td>

                        {/* 쇼츠 */}
                        <td style={{ padding: "12px 8px", textAlign: "center", verticalAlign: "middle" }}>
                          <button disabled style={{ padding: "6px 8px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 12, color: C.g400, cursor: "default" }}>AI 쇼츠 만들기</button>
                        </td>

                        {/* 채널 아이디 */}
                        <td style={{ padding: "12px 8px", textAlign: "center", verticalAlign: "middle" }}>
                          <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "center" }}>
                            <button style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 11, color: C.g600, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>아이디 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#777" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                            <button style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${C.g200}`, backgroundColor: C.white, fontSize: 11, color: C.g600, cursor: "pointer" }}>URL/설치</button>
                          </div>
                        </td>

                        {/* 시작일시 */}
                        <td style={{ padding: "12px 8px", fontSize: 12, color: C.g500, textAlign: "center", verticalAlign: "middle" }}>{row.startDate}</td>

                        {/* 등록일시 */}
                        <td style={{ padding: "12px 8px", fontSize: 12, color: C.g500, textAlign: "center", verticalAlign: "middle" }}>{row.regDate}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

      {/* 시나리오 전환 (어드민 UI 밖) */}
      <div style={{ borderTop: `2px solid ${C.g300}`, backgroundColor: "#FAFAFA", padding: "16px 24px", flexShrink: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.g900, marginBottom: 4 }}>시나리오 전환</div>
        <div style={{ fontSize: 12, color: C.g400, marginBottom: 16 }}>시나리오 버튼 클릭 시 해당 행이 하이라이트됩니다.</div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          {scenarios.map((sc, i) => (
            <button key={i} onClick={() => setActiveScenario(i)} style={{
              padding: "10px 16px", borderRadius: 8, cursor: "pointer", textAlign: "left",
              border: activeScenario === i ? `2px solid ${C.primary}` : `1px solid ${C.g200}`,
              backgroundColor: activeScenario === i ? C.primaryLight : C.white, flex: "1 1 280px",
            }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: activeScenario === i ? C.primary : C.g700, marginBottom: 4 }}>{sc.name}</div>
              <div style={{ fontSize: 11, color: C.g400, lineHeight: 1.5 }}>{sc.desc}</div>
              {i === 0 && (
                <div style={{ fontSize: 11, color: C.g500, marginTop: 6, lineHeight: 1.5 }}>
                  <div>VOD 타입: <strong style={{ color: C.blue600 }}>라이브</strong> | 자막: <strong style={{ color: C.amber700 }}>자막 생성중</strong> (펄스 애니메이션)</div>
                  <div>변환 완료 후 자막 생성이 진행 중인 상태를 목록에서 확인 가능</div>
                </div>
              )}
              {i === 1 && (
                <div style={{ fontSize: 11, color: C.g500, marginTop: 6, lineHeight: 1.5 }}>
                  <div>VOD 타입: <strong style={{ color: C.blue600 }}>라이브</strong> | 자막: <strong style={{ color: C.green700 }}>자막 생성완료</strong></div>
                  <div>상세 진입 없이 목록에서 자막 완료 여부 확인 가능</div>
                </div>
              )}
              {i === 2 && (
                <div style={{ fontSize: 11, color: C.g500, marginTop: 6, lineHeight: 1.5 }}>
                  <div>VOD 타입: <strong style={{ color: C.blue600 }}>업로드</strong> | 자막: <strong style={{ color: C.red600 }}>자막 생성실패</strong></div>
                  <div>자막 생성 실패 시 에러 배지로 노출되어 결과 확인 후 관리자 문의 필요 (자체 재시도 지원 안함)</div>
                </div>
              )}
            </button>
          ))}
        </div>
      </div>

    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
